# AlertManager configuration for the TechStream self-healing lab.
#
# Critical alerts are routed to the remediation webhook with a bearer token.
# The token is NOT stored in this file — it is read from a mounted file that
# deploy_local.sh writes from REMEDIATION_TOKEN in .env, so no secret is
# committed to git. Warnings go to a no-op receiver so they don't trigger a
# restart.

route:
  receiver: "null"
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 5m
  routes:
    - matchers:
        - severity = "critical"
      receiver: "remediation"
      # React fast — this is what makes the self-healing demo snappy.
      group_wait: 0s
      repeat_interval: 1m

receivers:
  - name: "null"

  - name: "remediation"
    webhook_configs:
      - url: "http://remediation:8081/webhook"
        send_resolved: false
        http_config:
          authorization:
            type: Bearer
            credentials_file: /etc/alertmanager/token
