name: Deploy

# Deploy to the EC2 only after the CI workflow succeeds on main. Deployment
# uses AWS SSM Run Command (not SSH), so the security group stays locked to a
# single IP — GitHub's runners never connect to the instance directly.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Don't let two deploys race; cancel an in-flight one if a newer push lands.
concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    # Only deploy if CI actually passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull + rebuild on the instance (SSM Run Command)
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail
          # Build the SSM payload as JSON (avoids shell-quoting issues with the
          # command). Runs as ec2-user, who owns the repo and is in the docker
          # group: pull latest main, then redeploy the stack.
          cat > ssm-payload.json <<JSON
          {
            "InstanceIds": ["${INSTANCE_ID}"],
            "DocumentName": "AWS-RunShellScript",
            "Comment": "CD ${GITHUB_SHA}",
            "Parameters": {
              "commands": ["runuser -l ec2-user -c 'cd ~/Self-Healing && git pull --ff-only origin main && bash scripts/deploy_local.sh'"]
            }
          }
          JSON
          CID=$(aws ssm send-command --cli-input-json file://ssm-payload.json \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CID"

          # Give SSM a moment to register the invocation, then wait for it.
          sleep 5
          aws ssm wait command-executed --command-id "$CID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation --command-id "$CID" \
            --instance-id "$INSTANCE_ID" --query "Status" --output text)
          echo "::group::deploy stdout"
          aws ssm get-command-invocation --command-id "$CID" \
            --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text
          echo "::endgroup::"
          echo "::group::deploy stderr"
          aws ssm get-command-invocation --command-id "$CID" \
            --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
          echo "::endgroup::"

          echo "Final status: $STATUS"
          [ "$STATUS" = "Success" ]
