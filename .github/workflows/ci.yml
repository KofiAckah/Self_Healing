name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r tests/requirements.txt

      - name: Lint (ruff)
        run: ruff check app chaos remediation ai_analysis tests

      - name: Run unit tests
        # RUN_E2E is unset, so the live integration test is skipped in CI.
        run: pytest -q

  docker-build:
    name: Build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build app image
        run: docker build -t techstream-app:ci ./app
      - name: Build remediation image
        run: docker build -t techstream-remediation:ci ./remediation

  terraform-validate:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
      - name: Format check
        run: terraform -chdir=terraform fmt -check -recursive
      - name: Validate
        # No backend access needed for validation.
        run: |
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate
